<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Service 4 CSV</title>
</head>
<body>

    <h1>Test Upload CSV</h1>

    <input type="file" id="csvFile">

    <button onclick="envoyerCSV()">
        Envoyer le CSV
    </button>

    <h2>Résultat :</h2>

    <pre id="resultat"></pre>

    <script>

        async function envoyerCSV() {

            const fichier =
                document.getElementById("csvFile").files[0];

            if (!fichier) {
                alert("Sélectionnez un fichier CSV");
                return;
            }

            const formData = new FormData();
            formData.append("file", fichier);

            try {

                const response = await fetch(
                    "http://127.0.0.1:5004/upload/csv",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                document.getElementById("resultat").textContent =
                    JSON.stringify(data, null, 2);

            } catch (error) {

                document.getElementById("resultat").textContent =
                    "Erreur : " + error;

            }
        }

    </script>

</body>
</html>
